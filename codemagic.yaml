workflows:
  romana-ios-testflight-workflow:
    name: ROMANA iOS Build and Publish to TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: noourway

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        provisioning_profiles:
          - ROMANA_Manual_Profile
        certificates:
          - ios_cert_manual

    scripts:
      - name: Clean and Get Dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Setup iOS Project
        script: |
          flutter build ios --config-only
          cd ios
          if [ -f "Podfile" ]; then
            sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/" Podfile
            sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/" Podfile
            
            cat << 'EOF' > fix_podfile.rb
            content = File.read('Podfile')
            fix = <<~RUBY
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
              if target.name == 'BoringSSL-GRPC'
                target.source_build_phase.files.each do |file|
                  if file.settings && file.settings['COMPILER_FLAGS']
                    flags = file.settings['COMPILER_FLAGS'].split
                    flags.reject! { |flag| flag == '-GCC_WARN_INHIBIT_ALL_WARNINGS' }
                    file.settings['COMPILER_FLAGS'] = flags.join(' ')
                  end
                end
              end
            RUBY
            content.gsub!('flutter_additional_ios_build_settings(target)', fix)
            File.write('Podfile', content)
            EOF
            
            ruby fix_podfile.rb
            rm fix_podfile.rb
            
            pod install --repo-update
          fi

      - name: Apply Vault Profiles
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - codexus.eg@gmail.com
